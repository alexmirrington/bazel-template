name: main

on:
  pull_request: ~
  push:
    branches:
      - main

permissions: {}

jobs:
  main:
    name: main
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: 🛒 Checkout
        uses: actions/checkout@v4 # v4

      - name: ✨ Lint
        uses: trunk-io/trunk-action@86b68ffae610a05105e90b1f52ad8c549ef482c2 # v1

      - name: 🤖 Set up just
        uses: extractions/setup-just@v2
        with:
          just-version: 1.25.2

      - name: 🐍 Set up Bazelisk
        uses: bazelbuild/setup-bazelisk@b39c379c82683a5f25d34f0d062761f62693e0b2 # v3

      - name: 💾 Mount Bazel cache
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4
        with:
          path: ~/.cache/bazel
          key: bazel-cache-${{ hashFiles('.bazelignore', '.bazelrc', '.bazelversion', 'WORKSPACE', 'WORKSPACE.bazel', 'MODULE.bazel', '**/*.bzl' ) }}
          restore-keys: bazel-cache-

      - name: 🔨 Build
        run: just build

      - name: 🎯 Test
        run: just test

      - name: ✨ Verify clean
        run: just verify-clean
